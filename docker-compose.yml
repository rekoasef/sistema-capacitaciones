# docker-compose.yml (CORREGIDO)
version: '3.8'

services:
  # --- SERVICIO FRONTEND ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Conexión Docker corregida: usa el nombre del servicio 'backend'
      NEXT_PUBLIC_API_URL: http://backend:3001 
      
  # --- SERVICIO BACKEND (SOLUCIÓN DEL ERROR 'NEST: NOT FOUND') ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:dev
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      # FIX: Solo montamos el código fuente local.
      # La carpeta node_modules ahora persistirá desde el proceso de BUILD.
      - ./backend:/usr/src/app 
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}

  # --- SERVICIO DB (SIN CAMBIOS) ---
  db:
    image: postgres:15
    container_name: capacitaciones_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: