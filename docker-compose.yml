# docker-compose.yml
version: '3.8'

services:
  # --- SERVICIO FRONTEND (MODIFICADO PARA PRODUCCIÓN) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile # <-- Ahora usamos el Dockerfile que creamos
    ports:
      - "3000:3000"
    # El 'command: npm run dev' se elimina. Usará el CMD del Dockerfile.
    # Los 'volumes' se eliminan. El código ya está 'cocinado' en la imagen.
    depends_on:
      - backend
    # environment:
      # Si el frontend necesitara variables de entorno en tiempo de ejecución,
      # se pondrían aquí. (Ej: NEXT_PUBLIC_API_URL=http://tu-dominio.com)

  # --- SERVICIO BACKEND (SIN CAMBIOS) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:prod
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/dist
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}

  # --- SERVICIO DB (SIN CAMBIOS) ---
  db:
    image: postgres:15
    container_name: capacitaciones_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: