# docker-compose.yml
version: '3.8'

services:
  # --- SERVICIO FRONTEND ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Conexión Docker corregida: usa el nombre del servicio 'backend'
      NEXT_PUBLIC_API_URL: http://backend:3001 
      
  # --- SERVICIO BACKEND (BYPASS DE ARRANQUE) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:dev # <-- Mantiene el contenedor abierto para reparación
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}

  # --- SERVICIO DB (SIN CAMBIOS) ---
  db:
    image: postgres:15
    container_name: capacitaciones_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: